# Pre-commit hooks for ori-sdk-python
#
# Install once: pre-commit install
# Run manually: pre-commit run --all-files
# Update hooks:  pre-commit autoupdate
#
# This is opt-in for contributors. CI enforces equivalent checks.

minimum_pre_commit_version: "3.7.0"
default_install_hook_types: [pre-commit, pre-push, commit-msg]

repos:
  # ── Ruff: lint + format ──────────────────────────────────────────────────────
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.9
    hooks:
      - id: ruff
        args: [--fix, --exit-non-zero-on-fix]
        files: ^(ori_sdk|tests)/.*\.py$
      - id: ruff-format
        files: ^(ori_sdk|tests)/.*\.py$

  # ── License header check ─────────────────────────────────────────────────────
  - repo: local
    hooks:
      - id: license-header
        name: Apache-2.0 license header
        language: python
        entry: python
        args:
          - -c
          - |-
            import pathlib
            import sys

            roots = {"ori_sdk", "tests"}
            missing = [
                str(f)
                for f in pathlib.Path(".").rglob("*.py")
                if f.parts and f.parts[0] in roots
                and "SPDX-License-Identifier: Apache-2.0" not in f.read_text()
            ]

            if missing:
                print("Missing license header:\n" + "\n".join(missing))
                sys.exit(1)
        pass_filenames: false

  # ── Commit message format ────────────────────────────────────────────────────
  - repo: local
    hooks:
      - id: conventional-commit
        name: Conventional commit format
        language: python
        stages: [commit-msg]
        entry: python
        args:
          - -c
          - |-
            import re
            import sys

            msg = open(sys.argv[1]).read().split("\n")[0]
            pattern = (
                r"^(feat|fix|docs|test|refactor|perf|build|ci|chore|revert|security)"
                r"(\([a-z0-9/-]+\))?: .{1,100}$"
            )
            if not re.match(pattern, msg):
                print("❌ Commit message does not follow Conventional Commits format.")
                print(f"   Got: {msg!r}")
                print("   Expected: type(scope): description")
                print("   Valid types: feat fix docs test refactor perf build ci chore revert security")
                sys.exit(1)
        pass_filenames: true

  # ── Basic file hygiene ───────────────────────────────────────────────────────
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
        exclude: \.md$
      - id: end-of-file-fixer
        exclude: \.md$
      - id: check-yaml
      - id: check-toml
      - id: check-merge-conflict
      - id: no-commit-to-branch
        args: [--branch, main]
